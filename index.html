<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pragati Campus App</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family: 'Segoe UI', sans-serif; }

/* DASHBOARD */
#dashboard {
    height: 100vh;
    background: linear-gradient(#6d1b1b, #3e0f0f);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.card-container {
    display: grid;
    grid-template-columns: repeat(2, 140px);
    gap: 15px;
}

.card {
    background: white;
    color: #6d1b1b;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

/* MAP SCREEN */
#mapScreen { display:none; }

.header {
    background: #6d1b1b;
    color: white;
    padding: 10px;
    text-align: center;
}

.top-bar {
    display: flex;
    gap: 8px;
    padding: 8px;
    background: #f5f5f5;
}

.top-bar input, .top-bar select {
    padding: 6px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

#map {
    height: calc(100vh - 170px);
}

/* Marker */
.leaflet-div-icon { background: transparent; border: none; }

.marker-tag {
    position: relative;
    background: #6d1b1b;
    color: #fff;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: bold;
    border-radius: 6px;
    white-space: nowrap;
    border: 2px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

/* Arrow pointing NORTH */
.marker-tag::after {
    content: "";
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-bottom: 10px solid #6d1b1b;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
}

.controls {
    height: 60px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: #f8f8f8;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard">
    <h1>PRAGATI CAMPUS</h1>
    <div class="card-container">
        <div class="card" onclick="openMap()">📍 Map</div>
        <div class="card" onclick="focusSearch()">🔍 Search</div>
        <div class="card" onclick="focusDirections()">🧭 Directions</div>
        <div class="card" onclick="giveFeedback()">💬 Feedback</div>
    </div>
</div>

<!-- MAP SCREEN -->
<div id="mapScreen">

    <div class="header">Campus Map</div>

    <div class="top-bar">
        <input type="text" id="searchBox" placeholder="Search block...">
        <select id="from"><option value="">From</option></select>
        <select id="to"><option value="">To</option></select>
        <button onclick="getDirections()">Go</button>
    </div>

    <div id="map"></div>

    <div class="controls">
        <button onclick="locateMe()">📍 Locate</button>
        <button onclick="goHome()">🏠 Home</button>
    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

let mapInitialized = false;
let map, markers = {}, routeLine;

/* OPEN MAP */
function openMap() {
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("mapScreen").style.display = "block";
    if (!mapInitialized) initMap();
}

/* BACK */
function goHome() {
    document.getElementById("mapScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "flex";
}

/* INIT MAP */
function initMap() {
    mapInitialized = true;

    map = L.map('map').setView([17.0836, 82.0536], 17);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 20
    }).addTo(map);

    // FLIPPED LAYOUT (LEFT ↔ RIGHT)
    const points = [
        { name: "Library", coords: [17.0836, 82.0536] },

        // LEFT
        { name: "Main Block", coords: [17.0836, 82.0534] },

        // RIGHT
        { name: "Mechanical Block", coords: [17.0836, 82.0538] },

        // DOWN
        { name: "Canteen", coords: [17.0833, 82.0536] },

        // TOP ROW (reversed)
        { name: "Playground", coords: [17.0839, 82.0534] },
        { name: "AIML Block", coords: [17.0839, 82.0538] },

        // EXTREMES
        { name: "ECE Block", coords: [17.0839, 82.0532] },
        { name: "Boys Hostel", coords: [17.0839, 82.0540] }
    ];

    points.forEach(p => {
        const marker = L.marker(p.coords, {
            icon: L.divIcon({
                html: `<div class="marker-tag">${p.name}</div>`
            })
        }).addTo(map);

        markers[p.name.toLowerCase()] = marker;

        document.getElementById("from").innerHTML += `<option>${p.name}</option>`;
        document.getElementById("to").innerHTML += `<option>${p.name}</option>`;
    });

    // Dynamic text size
    map.on('zoomend', () => {
        const zoom = map.getZoom();
        const size = zoom > 18 ? 15 : 12;

        document.querySelectorAll('.marker-tag').forEach(tag => {
            tag.style.fontSize = size + 'px';
        });
    });
}

/* SEARCH */
function focusSearch() {
    openMap();
    setTimeout(() => document.getElementById("searchBox").focus(), 300);
}

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("searchBox").addEventListener("keyup", function(e) {
        const val = e.target.value.toLowerCase();
        if (markers[val]) {
            map.setView(markers[val].getLatLng(), 19);
        }
    });
});

/* DIRECTIONS */
function focusDirections() {
    openMap();
}

function getDirections() {
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;

    if (!from || !to) return alert("Select both locations");

    if (routeLine) map.removeLayer(routeLine);

    routeLine = L.polyline([
        markers[from.toLowerCase()].getLatLng(),
        markers[to.toLowerCase()].getLatLng()
    ], { color: 'blue', weight: 4 }).addTo(map);

    map.fitBounds(routeLine.getBounds());
}

/* LOCATE */
let userMarker;

function locateMe() {
    map.locate({ setView: true, maxZoom: 18 });
}

document.addEventListener("locationfound", function(e) {
    if (userMarker) map.removeLayer(userMarker);

    userMarker = L.circleMarker(e.latlng, {
        radius: 7,
        fillColor: "#2196F3",
        color: "white",
        weight: 2,
        fillOpacity: 1
    }).addTo(map);
});

/* FEEDBACK */
function giveFeedback() {
    const msg = prompt("Enter your feedback:");
    if (msg) alert("Thanks for your feedback!");
}

</script>

</body>
</html>
